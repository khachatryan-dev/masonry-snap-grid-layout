name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          echo "── dist contents ──────────────────────────────"
          ls -lh dist/ dist/react/ dist/vue/ 2>/dev/null || true
          echo "───────────────────────────────────────────────"
          [ -f dist/index.js ]       || (echo "❌ dist/index.js missing"       && exit 1)
          [ -f dist/react/index.js ] || (echo "❌ dist/react/index.js missing" && exit 1)
          [ -f dist/vue/index.js ]   || (echo "❌ dist/vue/index.js missing"   && exit 1)
          [ -f dist/style.css ]      || (echo "❌ dist/style.css missing"      && exit 1)
          [ -f dist/index.d.ts ]     || (echo "❌ dist/index.d.ts missing"     && exit 1)
          echo "✅ All required dist files present"
