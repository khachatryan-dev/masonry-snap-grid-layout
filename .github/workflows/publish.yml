name: Publish to npm

on:
  push:
    branches: [ main ]  # Trigger on main branch push

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node.js & npm registry
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      # 3️⃣ Upgrade npm to latest (required for trusted publishing)
      - name: Upgrade npm
        run: npm install -g npm@latest

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 5️⃣ Run tests
      - name: Run tests
        run: npm test

      # 6️⃣ Build package
      - name: Build package
        run: npm run build

      # 7️⃣ Bump version (optional)
      - name: Bump version
        id: version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          npm version patch --no-git-tag-version
          echo "new_version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      # 8️⃣ Commit & push version (optional)
      - name: Commit and tag version
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version to v${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Version ${{ steps.version.outputs.new_version }}"
          git push origin HEAD:main
          git push origin --tags

      # 9️⃣ Publish to npm via Trusted Publishing
      - name: Publish via Trusted Publishing
        run: npm publish --provenance