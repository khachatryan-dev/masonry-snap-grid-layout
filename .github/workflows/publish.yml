name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ✅ Required for pushing tags/commits
      packages: write        # ✅ Required for npm publish
      id-token: write        # ✅ Required for OIDC (trusted publishing)

    steps:
      # ------------------------------
      # 1️⃣ Checkout Repository
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------
      # 2️⃣ Setup Node.js
      # ------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      # ------------------------------
      # 3️⃣ Install Dependencies
      # ------------------------------
      - name: Install dependencies
        run: npm ci

      # ------------------------------
      # 4️⃣ Run Tests
      # ------------------------------
      - name: Run tests
        run: npm test

      # ------------------------------
      # 5️⃣ Fix package.json
      # ------------------------------
      - name: Fix package.json
        run: npm pkg fix

      # ------------------------------
      # 6️⃣ Bump Version
      # ------------------------------
      - name: Bump version
        id: version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # bump patch version without git tag
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ------------------------------
      # 7️⃣ Commit & Push Version
      # ------------------------------
      - name: Commit and push version
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version to v${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Version ${{ steps.version.outputs.new_version }}"
          git push origin HEAD:main
          git push origin --tags

      # ------------------------------
      # 8️⃣ Build Package
      # ------------------------------
      - name: Build package
        run: npm run build