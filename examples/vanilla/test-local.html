<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masonry Snap Grid - Local Test</title>
    <link rel="stylesheet" href="../dist/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #020617;
            color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        h1 {
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .test-section {
            margin-bottom: 60px;
        }
        .container {
            margin-top: 20px;
        }
        .info {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🧩 Masonry Snap Grid Layout - Local Test</h1>

    <!-- JavaScript Version Test -->
    <div class="test-section">
        <h1>✓ JavaScript Masonry</h1>
        <div class="info">
            Testing pure JavaScript masonry layout engine
        </div>
        <div id="js-container" class="container"></div>
    </div>

    <!-- CSS Masonry Test (if supported) -->
    <div class="test-section">
        <h1>✓ CSS Masonry (if supported)</h1>
        <div class="info" id="css-info">
            Checking browser support for CSS masonry...
        </div>
        <div id="css-container" class="container"></div>
    </div>

    <!-- Auto Mode Test -->
    <div class="test-section">
        <h1>✓ Auto Mode (Prefer CSS, Fallback JS)</h1>
        <div class="info">
            Auto mode: uses CSS masonry if available, falls back to JavaScript
        </div>
        <div id="auto-container" class="container"></div>
    </div>

    <script type="module">
        import MasonrySnapGridLayout from '../dist/index.mjs';

        // Generate test items
        const generateItems = (count) => {
            return Array.from({ length: count }, (_, i) => ({
                id: i,
                title: `Card ${i + 1}`,
                height: 140 + Math.random() * 160,
                color: `hsl(${i * 18}, 80%, 60%)`
            }));
        };

        const items = generateItems(24);

        // Render function
        const renderItem = (item) => {
            const el = document.createElement('div');
            el.style.height = item.height + 'px';
            el.style.borderRadius = '12px';
            el.style.padding = '16px';
            el.style.color = '#0f172a';
            el.style.background = `linear-gradient(135deg, ${item.color} 0%, hsl(${item.id * 18 + 40}, 90%, 70%) 100%)`;
            el.style.display = 'flex';
            el.style.alignItems = 'center';
            el.style.justifyContent = 'center';
            el.innerHTML = `<h3 style="margin: 0;">${item.title}</h3>`;
            return el;
        };

        // Test 1: JavaScript Mode
        try {
            const jsContainer = document.getElementById('js-container');
            new MasonrySnapGridLayout(jsContainer, {
                layoutMode: 'js',
                gutter: 16,
                minColWidth: 220,
                items,
                renderItem,
                animate: true,
                transitionDuration: 400,
            });
            console.log('✓ JavaScript masonry initialized successfully');
        } catch (err) {
            console.error('✗ JavaScript masonry failed:', err);
            document.getElementById('js-container').innerHTML = `<div style="color: red; padding: 20px;">Error: ${err.message}</div>`;
        }

        // Test 2: CSS Mode
        try {
            const cssContainer = document.getElementById('css-container');
            const isCSSSupported = CSS.supports('grid-template-rows', 'masonry') ||
                                   CSS.supports('masonry-auto-flow', 'next');

            if (isCSSSupported) {
                document.getElementById('css-info').textContent = '✓ CSS Masonry supported by this browser';
                new MasonrySnapGridLayout(cssContainer, {
                    layoutMode: 'css',
                    gutter: 16,
                    minColWidth: 220,
                    items,
                    renderItem,
                });
                console.log('✓ CSS masonry initialized successfully');
            } else {
                document.getElementById('css-info').textContent = '⚠ CSS Masonry NOT supported, using JavaScript fallback';
                new MasonrySnapGridLayout(cssContainer, {
                    layoutMode: 'css',
                    gutter: 16,
                    minColWidth: 220,
                    items,
                    renderItem,
                });
                console.log('✓ CSS masonry not supported, fell back to JS');
            }
        } catch (err) {
            console.error('✗ CSS masonry failed:', err);
            document.getElementById('css-container').innerHTML = `<div style="color: red; padding: 20px;">Error: ${err.message}</div>`;
        }

        // Test 3: Auto Mode
        try {
            const autoContainer = document.getElementById('auto-container');
            new MasonrySnapGridLayout(autoContainer, {
                layoutMode: 'auto',
                gutter: 16,
                minColWidth: 220,
                items,
                renderItem,
                animate: true,
                transitionDuration: 400,
            });
            console.log('✓ Auto mode masonry initialized successfully');
        } catch (err) {
            console.error('✗ Auto mode masonry failed:', err);
            document.getElementById('auto-container').innerHTML = `<div style="color: red; padding: 20px;">Error: ${err.message}</div>`;
        }

        // Test window resize
        window.addEventListener('resize', () => {
            console.log('Resize event triggered - layouts should adjust automatically');
        });

        console.log('=== Masonry Tests Complete ===');
        console.log('All three masonry modes should be visible above.');
        console.log('Try resizing the window to see responsive behavior.');
    </script>
</body>
</html>
