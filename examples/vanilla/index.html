<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>masonry-snap-grid-layout — Vanilla JS</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 24px; }
      h1 { margin-bottom: 8px; font-size: 1.4rem; color: #333; }

      #badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
      .badge {
        padding: 4px 10px; border-radius: 99px; color: #fff;
        font-size: .75rem; font-weight: 600; white-space: nowrap;
      }

      #controls {
        display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
        margin-bottom: 24px; padding: 16px;
        background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
      }
      .ctrl { display: flex; flex-direction: column; gap: 4px; font-size: .8rem; color: #555; }
      .ctrl input[type=range] { width: 120px; }

      .seg { display: flex; gap: 4px; }
      .seg button {
        padding: 4px 10px; border: none; border-radius: 6px; cursor: pointer;
        font-size: .75rem; font-weight: 600; background: #e5e7eb; color: #374151;
      }
      .seg button.active { background: #4f46e5; color: #fff; }

      .action-btns { display: flex; gap: 8px; flex-wrap: wrap; padding-bottom: 2px; }
      .btn { padding: 8px 14px; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: .875rem; }
      .btn-add    { background: #4f46e5; }
      .btn-remove { background: #6b7280; }
      .btn-reset  { background: #9ca3af; }
      .btn:hover  { filter: brightness(1.1); }

      .card {
        border-radius: 12px; padding: 16px;
        display: flex; flex-direction: column; gap: 8px;
        font-size: .875rem; color: #333;
      }
      .card strong { font-size: 1rem; }
      .card p { color: #555; line-height: 1.5; margin: 0; }
    </style>
  </head>
  <body>
    <h1>masonry-snap-grid-layout — Vanilla JS Demo</h1>

    <div id="badges">
      <span id="badge-engine" class="badge" style="background:#4f46e5">⚙ JS masonry</span>
      <span id="badge-count"  class="badge" style="background:#6b7280">0 items</span>
    </div>

    <div id="controls">
      <div class="ctrl">
        Layout mode
        <div class="seg" id="mode-seg">
          <button data-mode="auto">auto (detect CSS)</button>
          <button data-mode="js" class="active">js (always JS)</button>
        </div>
      </div>

      <div class="ctrl">
        <span id="gutter-label">Gutter: 16px</span>
        <input id="gutter" type="range" min="0" max="40" value="16" />
      </div>

      <div class="ctrl">
        <span id="col-label">Min col: 220px</span>
        <input id="minColWidth" type="range" min="100" max="400" value="220" />
      </div>

      <div class="ctrl">
        Animate
        <div class="seg" id="animate-seg">
          <button data-anim="true" class="active">ON</button>
          <button data-anim="false">OFF</button>
        </div>
      </div>

      <div class="action-btns">
        <button class="btn btn-add"    id="addBtn">+ Add</button>
        <button class="btn btn-remove" id="removeBtn">− Remove</button>
        <button class="btn btn-reset"  id="resetBtn">↺ Reset</button>
      </div>
    </div>

    <div id="grid" class="msgl-container"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
